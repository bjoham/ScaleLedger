  <script type="module">
    import React, { useState, useEffect, useRef, useMemo } from "react";
    import { createRoot } from "react-dom/client";
    import { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, Customized } from "recharts";
    import { Camera, Plus, Trash2, TrendingDown, TrendingUp, Minus, Settings, X, Loader2, Download, Upload, ChevronDown, ChevronUp, Key } from "lucide-react";

    const e = React.createElement;

    const APP_VERSION = "v14";

    // ---------- Storage (localStorage) ----------
    const store = {
      get(key) {
        try {
          const v = localStorage.getItem(key);
          return v === null ? null : JSON.parse(v);
        } catch { return null; }
      },
      set(key, value) {
        try { localStorage.setItem(key, JSON.stringify(value)); } catch (err) { console.error(err); }
      },
      remove(key) { try { localStorage.removeItem(key); } catch {} },
    };

    const WINDOWS = [
      { key: "1w", label: "1W", months: 0, days: 7 },
      { key: "1m", label: "1M", months: 1 },
      { key: "3m", label: "3M", months: 3 },
      { key: "6m", label: "6M", months: 6 },
      { key: "12m", label: "12M", months: 12 },
    ];
    const HISTORY_PREVIEW = 3;

    function niceInterval(lo, hi) {
      const options = [1, 2, 5, 10, 20, 50];
      const target = 5;
      let best = null;
      for (const step of options) {
        const first = Math.floor(lo / step) * step;
        const last = Math.ceil(hi / step) * step;
        const count = Math.round((last - first) / step) + 1;
        if (count < 3 || count > 7) continue;
        const dist = Math.abs(count - target);
        if (best === null || dist < best.dist || (dist === best.dist && count > best.count)) {
          best = { step, count, dist };
        }
      }
      return best ? best.step : 1;
    }

    function buildTicks(minVal, maxVal) {
      const padded = Math.max((maxVal - minVal) * 0.1, 0.5);
      const lo = minVal - padded;
      const hi = maxVal + padded;
      const step = niceInterval(lo, hi);
      const first = Math.floor(lo / step) * step;
      const last = Math.ceil(hi / step) * step;
      const ticks = [];
      for (let v = first; v <= last + 0.0001; v += step) ticks.push(Math.round(v * 100) / 100);
      return { ticks, domain: [first, last] };
    }

    function regression(points) {
      if (points.length < 2) return null;
      const xs = points.map((p) => p.x);
      const ys = points.map((p) => p.y);
      const n = xs.length;
      const meanX = xs.reduce((a, b) => a + b, 0) / n;
      const meanY = ys.reduce((a, b) => a + b, 0) / n;
      let num = 0, den = 0;
      for (let i = 0; i < n; i++) {
        num += (xs[i] - meanX) * (ys[i] - meanY);
        den += (xs[i] - meanX) ** 2;
      }
      if (den === 0) return null;
      const slope = num / den;
      const intercept = meanY - slope * meanX;
      return { slope, intercept };
    }

    // ---------- OpenCV.js lazy loader ----------
    // Only loads when the user has enabled "Enhanced scale reading" and taps Check.
    // Uses a polling-based ready check rather than onRuntimeInitialized, which
    // is unreliable across opencv.js builds.
    let cvPromise = null;
    let cvLoadStatus = "not started"; // for diagnostics
    function loadOpenCV(onStatus) {
      if (onStatus) onStatus(cvLoadStatus);
      if (cvPromise) return cvPromise;
      cvPromise = new Promise((resolve, reject) => {
        if (typeof window.cv !== "undefined" && window.cv.Mat) {
          cvLoadStatus = "ready";
          resolve(window.cv); return;
        }

        const TIMEOUT_MS = 60000;
        const start = Date.now();
        const updateStatus = (s) => { cvLoadStatus = s; if (onStatus) onStatus(s); };

        updateStatus("starting download");
        const script = document.createElement("script");
        script.src = "https://docs.opencv.org/4.5.5/opencv.js";
        script.async = true;
        script.onload = async () => {
          const cvType = typeof window.cv;
          updateStatus(`downloaded (cv type: ${cvType})`);
          try {
            // Newer builds: cv is a factory function → await it
            if (cvType === "function") {
              updateStatus("calling cv() factory");
              const ready = await window.cv();
              window.cv = ready;
              if (window.cv && window.cv.Mat) {
                updateStatus("ready (factory)");
                resolve(window.cv);
                return;
              }
              cvPromise = null;
              updateStatus("factory resolved but no Mat");
              reject(new Error("cv() resolved but Mat missing"));
              return;
            }
            // Older builds: cv is an object, poll for cv.Mat
            updateStatus("polling for cv.Mat");
            const poll = setInterval(() => {
              const elapsed = Date.now() - start;
              if (typeof window.cv !== "undefined" && window.cv.Mat) {
                clearInterval(poll);
                updateStatus("ready (polled)");
                resolve(window.cv);
              } else if (elapsed > TIMEOUT_MS) {
                clearInterval(poll);
                cvPromise = null;
                const typeofCv = typeof window.cv;
                const keys = window.cv ? Object.keys(window.cv).slice(0, 5).join(",") : "n/a";
                updateStatus(`timeout (cv type: ${typeofCv}, keys: ${keys})`);
                reject(new Error(`OpenCV init timed out (cv type: ${typeofCv})`));
              } else {
                updateStatus(`polling… ${Math.floor(elapsed/1000)}s`);
              }
            }, 200);
          } catch (err) {
            cvPromise = null;
            updateStatus(`error: ${err.message}`);
            reject(err);
          }
        };
        script.onerror = () => {
          updateStatus("network error");
          cvPromise = null;
          reject(new Error("Network error loading OpenCV.js"));
        };
        document.head.appendChild(script);
      });
      return cvPromise;
    }

    // ---------- DSP preprocessing (per scale_reader_pipeline.md) ----------
    // Takes a source canvas, returns a data URL of the 30% threshold mask.
    // Throws on OpenCV error; caller should fall back to the raw image.
    function preprocessForOcr(sourceCanvas) {
      const cv = window.cv;
      const src = cv.imread(sourceCanvas);
      const gray = new cv.Mat();
      const ink = new cv.Mat();
      const inkBlur = new cv.Mat();
      const baseline = new cv.Mat();
      const residual = new cv.Mat();
      const mask = new cv.Mat();
      let disk = null;
      try {
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
        // ink = 255 - gray  (segments become high)
        const ones = new cv.Mat(gray.rows, gray.cols, gray.type(), new cv.Scalar(255));
        cv.subtract(ones, gray, ink);
        ones.delete();

        const W = src.cols;
        let strokeW = Math.max(5, Math.min(120, Math.floor(W / 20)));
        // Gaussian kernel must be odd
        let gk = strokeW % 2 === 1 ? strokeW : strokeW + 1;
        const sigma = strokeW / 6.0;
        cv.GaussianBlur(ink, inkBlur, new cv.Size(gk, gk), sigma, sigma, cv.BORDER_DEFAULT);

        // Morphological opening with disk ≈ 3 × strokeW
        let diskSz = Math.max(31, 3 * strokeW);
        if (diskSz % 2 === 0) diskSz += 1;
        disk = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(diskSz, diskSz));
        cv.morphologyEx(inkBlur, baseline, cv.MORPH_OPEN, disk);

        // residual = inkBlur - baseline, normalized to [0, ~1]
        cv.subtract(inkBlur, baseline, residual);
        residual.convertTo(residual, cv.CV_32F, 1.0 / 255.0);

        // Find 5th and 99th percentiles manually (OpenCV.js has no np.percentile)
        const data = residual.data32F;
        // Sample every 4th pixel for speed on large images
        const stride = Math.max(1, Math.floor(data.length / 20000));
        const sample = [];
        for (let i = 0; i < data.length; i += stride) sample.push(data[i]);
        sample.sort((a, b) => a - b);
        const valley = sample[Math.floor(sample.length * 0.05)];
        const peak = sample[Math.floor(sample.length * 0.99)];
        const threshold = valley + 0.30 * (peak - valley);

        // mask = residual > threshold
        cv.threshold(residual, mask, threshold, 255, cv.THRESH_BINARY);
        mask.convertTo(mask, cv.CV_8U);

        // Render to canvas
        const outCanvas = document.createElement("canvas");
        outCanvas.width = mask.cols;
        outCanvas.height = mask.rows;
        cv.imshow(outCanvas, mask);
        return outCanvas.toDataURL("image/jpeg", 0.92);
      } finally {
        src.delete(); gray.delete(); ink.delete(); inkBlur.delete();
        baseline.delete(); residual.delete(); mask.delete();
        if (disk) disk.delete();
      }
    }

    function WeightTracker() {
      const [entries, setEntries] = useState(() => store.get("weight-entries") || []);
      const [height, setHeight] = useState(() => store.get("user-height") ?? 170);
      const [apiKey, setApiKey] = useState(() => store.get("anthropic-api-key") || "");
      const [apiKeyInput, setApiKeyInput] = useState("");
      const [enhancedReading, setEnhancedReading] = useState(() => store.get("enhanced-reading") || false);

      const [showAdd, setShowAdd] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [showApiKeySheet, setShowApiKeySheet] = useState(false);
      const [manualWeight, setManualWeight] = useState("");
      const [manualDate, setManualDate] = useState(new Date().toISOString().slice(0, 16));
      const [imageProcessing, setImageProcessing] = useState(false);
      const [processingStatus, setProcessingStatus] = useState("");
      const [debugLog, setDebugLog] = useState(() => store.get("debug-log") || []);
      const [showDebugLog, setShowDebugLog] = useState(false);
      const logLine = (msg) => {
        const line = `${new Date().toLocaleTimeString()} ${msg}`;
        console.log(line);
        setDebugLog((prev) => {
          const next = [...prev.slice(-49), line];
          try { store.set("debug-log", next); } catch {}
          return next;
        });
      };
      const [processingError, setProcessingError] = useState("");
      const [detectedWeight, setDetectedWeight] = useState(null);
      const [editableWeight, setEditableWeight] = useState(""); // string for the editable input
      const [rawImage, setRawImage] = useState(null);      // data URL just after taking photo, with natural dimensions
      const [rawImageSize, setRawImageSize] = useState(null); // { w, h }
      const [cropRect, setCropRect] = useState({ x: 0.2, y: 0.2, w: 0.6, h: 0.6 }); // fractions 0..1
      const [croppedImage, setCroppedImage] = useState(null); // data URL of cropped region (shown on review screen)
      const [windowKey, setWindowKey] = useState("1m");
      const [importMessage, setImportMessage] = useState(null);
      const [showAllHistory, setShowAllHistory] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const fileInputRef = useRef(null);
      const importInputRef = useRef(null);

      const saveEntries = (ne) => { setEntries(ne); store.set("weight-entries", ne); };
      const saveHeight = (nh) => { setHeight(nh); store.set("user-height", nh); };
      const saveApiKey = (k) => { setApiKey(k); if (k) store.set("anthropic-api-key", k); else store.remove("anthropic-api-key"); };
      const saveEnhancedReading = (v) => { setEnhancedReading(v); store.set("enhanced-reading", v); };

      const addEntry = (weight, timestamp) => {
        const entry = { id: Date.now() + Math.random(), weight: parseFloat(weight), timestamp: timestamp || new Date().toISOString() };
        saveEntries([...entries, entry].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp)));
      };

      const deleteEntry = (id) => saveEntries(entries.filter((x) => x.id !== id));

      const deleteOlderThan = (months) => {
        const cutoff = new Date();
        cutoff.setMonth(cutoff.getMonth() - months);
        const kept = entries.filter((x) => new Date(x.timestamp) >= cutoff);
        const removed = entries.length - kept.length;
        if (removed === 0) { alert("No entries older than that."); return; }
        if (confirm(`Delete ${removed} ${removed === 1 ? "entry" : "entries"} older than ${months} months?`)) {
          saveEntries(kept);
        }
      };

      const handleImageUpload = async (ev) => {
        const file = ev.target.files?.[0];
        if (!file) return;
        setProcessingError("");
        setDetectedWeight(null);
        setCroppedImage(null);
        try {
          // Read the file and figure out its natural dimensions
          const dataUrl = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => reject(new Error("Could not read image"));
            reader.readAsDataURL(file);
          });
          const img = await new Promise((resolve, reject) => {
            const i = new Image();
            i.onload = () => resolve(i);
            i.onerror = () => reject(new Error("Could not load image"));
            i.src = dataUrl;
          });
          setRawImage(dataUrl);
          setRawImageSize({ w: img.naturalWidth, h: img.naturalHeight });
          // Default crop: centered, 60% of each dimension
          setCropRect({ x: 0.2, y: 0.2, w: 0.6, h: 0.6 });
        } catch (err) {
          console.error(err);
          setProcessingError(`Couldn't load the photo: ${err.message || "unknown error"}.`);
        } finally {
          if (fileInputRef.current) fileInputRef.current.value = "";
        }
      };

      // Called when user confirms the crop ("Check" button).
      // Renders the current raw image + cropRect to a canvas (in memory).
      // Consumer is responsible for encoding to data URL.
      const renderCropToCanvas = async () => {
        const img = await new Promise((resolve, reject) => {
          const i = new Image();
          i.onload = () => resolve(i);
          i.onerror = () => reject(new Error("Could not load image"));
          i.src = rawImage;
        });
        const cw = Math.max(1, Math.round(rawImageSize.w * cropRect.w));
        const ch = Math.max(1, Math.round(rawImageSize.h * cropRect.h));
        const cx = Math.round(rawImageSize.w * cropRect.x);
        const cy = Math.round(rawImageSize.h * cropRect.y);
        const SCALE = 2;
        const MAX_DIM = 1568;
        let outW = cw * SCALE, outH = ch * SCALE;
        if (outW > MAX_DIM || outH > MAX_DIM) {
          const k = MAX_DIM / Math.max(outW, outH);
          outW = Math.round(outW * k);
          outH = Math.round(outH * k);
        }
        const canvas = document.createElement("canvas");
        canvas.width = outW;
        canvas.height = outH;
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ctx.drawImage(img, cx, cy, cw, ch, 0, 0, outW, outH);
        return canvas;
      };

      // Crops the raw image to the rectangle, sends to the API, then shows the review screen.
      const sendCropped = async () => {
        if (!rawImage || !rawImageSize || !apiKey) return;
        setProcessingError("");
        setProcessingStatus("");
        setImageProcessing(true);
        try {
          const canvas = await renderCropToCanvas();
          const croppedDataUrl = canvas.toDataURL("image/jpeg", 0.92);
          setCroppedImage(croppedDataUrl);
          const rawBase64 = croppedDataUrl.split(",")[1];

          // Build the content blocks. If enhanced reading is enabled, try to
          // preprocess; fall back gracefully on any error.
          const content = [];
          let usedEnhanced = false;
          if (enhancedReading) {
            try {
              logLine(`Enhanced on. Canvas ${canvas.width}x${canvas.height}`);
              setProcessingStatus("Loading OpenCV…");
              logLine("Calling loadOpenCV…");
              await loadOpenCV((s) => { setProcessingStatus(`OpenCV: ${s}`); logLine(`OpenCV status: ${s}`); });
              logLine("OpenCV ready.");
              setProcessingStatus("Processing image…");
              logLine("Running preprocessForOcr…");
              const maskDataUrl = preprocessForOcr(canvas);
              logLine(`Mask produced, ${Math.round(maskDataUrl.length / 1024)} KB`);
              const maskBase64 = maskDataUrl.split(",")[1];
              content.push({ type: "image", source: { type: "base64", media_type: "image/jpeg", data: rawBase64 } });
              content.push({ type: "image", source: { type: "base64", media_type: "image/jpeg", data: maskBase64 } });
              usedEnhanced = true;
              setProcessingStatus("Sending to AI…");
            } catch (preErr) {
              console.warn("Enhanced preprocessing failed:", preErr);
              logLine(`Enhanced FAILED: ${preErr.message}`);
              setProcessingStatus(`Enhanced failed. Falling back to raw.`);
              content.push({ type: "image", source: { type: "base64", media_type: "image/jpeg", data: rawBase64 } });
            }
          } else {
            content.push({ type: "image", source: { type: "base64", media_type: "image/jpeg", data: rawBase64 } });
          }

          const prompt = usedEnhanced
            ? `You have two images of the same bathroom scale's 7-segment LCD display:
1. The raw photo.
2. A binary mask where lit segments are white and everything else is black, produced by digital signal processing to suppress dust, reflections, and lighting gradients.

Read the weight shown. The scale reads values between 0.0 and 199.9 kg with one decimal, and does not zero-pad (so "9.9", "10.0", "99.9", "100.0" are all valid formats).

Prefer the binary mask for identifying which segments are lit. Use the raw photo to disambiguate when the mask is unclear (e.g. if reflections merged into a digit).

For each digit, consider which segments are lit. Common pitfalls:
- 5 vs 9: a 5 is open on the top-right; a 9 is closed.
- 5 vs 6: a 5 has no bottom-left segment; a 6 does.
- 3 vs 8: a 3 has no left segments; an 8 has both.
- 0 vs 8: a 0 has no middle segment; an 8 has the middle.
- A reflection of a "0" below a real "0" can visually merge into an "8" — watch for this.

Respond ONLY with a JSON object, no other text:
{"digits": "<e.g. '90.5'>", "reasoning": "<one short sentence>", "weight_kg": <number>, "confidence": "high"|"medium"|"low"}

If you cannot read a weight: {"digits": null, "reasoning": "<why>", "weight_kg": null, "confidence": "low"}`
            : `This is a cropped photo of a bathroom scale's 7-segment LCD display. The scale reads values between 0.0 and 199.9 kg with one decimal, and does not zero-pad.

Read the weight, digit by digit. For each digit position, look carefully at which segments are lit.

Common pitfalls:
- 5 vs 9: a 5 has NO bottom-right segment in the top half; a 9 is fully closed on the right
- 5 vs 6: a 5 has NO bottom-left segment; a 6 does
- 3 vs 8: a 3 has no left-side segments; an 8 has both left segments
- 0 vs 8: a 0 has NO middle segment; an 8 has the middle segment
- 1 vs 7: a 7 has the top segment; a 1 does not

Ignore any faded "ghost" segments from previous readings.

Respond ONLY with a JSON object, no other text, no markdown:
{"digits": "<the digits you read, e.g. '90.5'>", "reasoning": "<one short sentence per digit>", "weight_kg": <number>, "confidence": "high"|"medium"|"low"}

If you cannot read a weight, use {"digits": null, "reasoning": "<why>", "weight_kg": null, "confidence": "low"}.`;
          content.push({ type: "text", text: prompt });

          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-5",
              max_tokens: 200,
              messages: [{ role: "user", content }],
            }),
          });
          if (!response.ok) {
            const errText = await response.text();
            throw new Error(`API error ${response.status}: ${errText.slice(0, 200)}`);
          }
          const data = await response.json();
          const text = (data.content || []).map((i) => i.text || "").join("").trim();
          const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
          if (parsed.weight_kg === null || parsed.weight_kg === undefined) {
            setProcessingError("Couldn't read the weight. Try adjusting the crop, or tap Back to enter manually.");
            setCroppedImage(null); // stay on crop screen
          } else if (parsed.weight_kg < 30 || parsed.weight_kg > 200) {
            setProcessingError(`Got ${parsed.weight_kg} kg — that seems off. Please verify.`);
            setDetectedWeight(parsed.weight_kg);
            setEditableWeight(parsed.weight_kg.toFixed(1));
          } else {
            setDetectedWeight(parsed.weight_kg);
            setEditableWeight(parsed.weight_kg.toFixed(1));
          }
        } catch (err) {
          console.error(err);
          setProcessingError(`Something went wrong: ${err.message || "unknown error"}. Try again or enter manually.`);
          setCroppedImage(null); // stay on crop screen so user can retry
        } finally {
          setImageProcessing(false);
          setProcessingStatus("");
        }
      };

      // No API key: crop the image locally and go straight to the review screen
      // with an empty editable weight. User types in the reading while looking at the photo.
      const proceedWithoutApi = async () => {
        if (!rawImage || !rawImageSize) return;
        setProcessingError("");
        setImageProcessing(true);
        try {
          const canvas = await renderCropToCanvas();
          const croppedDataUrl = canvas.toDataURL("image/jpeg", 0.92);
          setCroppedImage(croppedDataUrl);
          // Sentinel value: we need detectedWeight to be non-null so the review
          // stage renders, but the editable input starts empty.
          setDetectedWeight(0);
          setEditableWeight("");
        } catch (err) {
          console.error(err);
          setProcessingError(`Couldn't crop the image: ${err.message || "unknown error"}.`);
        } finally {
          setImageProcessing(false);
        }
      };

      // "Back" from the crop screen: clear raw image, go back to idle.
      const backFromCrop = () => {
        setRawImage(null); setRawImageSize(null); setCroppedImage(null);
        setDetectedWeight(null); setEditableWeight(""); setProcessingError("");
      };

      const confirmDetected = () => {
        const w = parseFloat(editableWeight);
        if (!isNaN(w) && w > 0) { addEntry(w, new Date().toISOString()); resetAddSheet(); }
      };

      const submitManual = () => {
        const w = parseFloat(manualWeight);
        if (isNaN(w) || w <= 0) return;
        const ts = new Date(manualDate).toISOString();
        if (editingId != null) {
          const updated = entries
            .map((x) => (x.id === editingId ? { ...x, weight: w, timestamp: ts } : x))
            .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
          saveEntries(updated);
        } else {
          addEntry(w, ts);
        }
        resetAddSheet();
      };

      const openEdit = (entry) => {
        setEditingId(entry.id);
        setManualWeight(String(entry.weight));
        const d = new Date(entry.timestamp);

        let tStart = null, tEnd = null;
        if (reg) {

          tEnd = reg.intercept + reg.slope * endTs;

          if (!hasEnd) unified.push({ ts: endTs, weight: null, trend: tEnd });

    function CropOverlay({ src, rect, onRectChange }) {
      const containerRef = useRef(null);
      const imgRef = useRef(null);
      const [dragState, setDragState] = useState(null);
      // dragState shape: { mode: 'move' | 'tl' | 'tr' | 'bl' | 'br', startX, startY, origRect }

      const MIN_SIZE = 0.05; // minimum crop size as a fraction

      const getPointerFrac = (ev) => {
        const el = containerRef.current;
        if (!el) return null;
        const r = el.getBoundingClientRect();
        const clientX = ev.touches ? ev.touches[0].clientX : ev.clientX;
        const clientY = ev.touches ? ev.touches[0].clientY : ev.clientY;
        return {
          x: Math.max(0, Math.min(1, (clientX - r.left) / r.width)),
          y: Math.max(0, Math.min(1, (clientY - r.top) / r.height)),
        };
      };

      const onPointerDown = (mode) => (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        const p = getPointerFrac(ev);
        if (!p) return;
        setDragState({ mode, startX: p.x, startY: p.y, origRect: { ...rect } });
      };

      const onPointerMove = (ev) => {
        if (!dragState) return;
        ev.preventDefault();
        const p = getPointerFrac(ev);
        if (!p) return;
        const dx = p.x - dragState.startX;
        const dy = p.y - dragState.startY;
        const o = dragState.origRect;
        let nx = o.x, ny = o.y, nw = o.w, nh = o.h;
        if (dragState.mode === "move") {
          nx = Math.max(0, Math.min(1 - o.w, o.x + dx));
          ny = Math.max(0, Math.min(1 - o.h, o.y + dy));
        } else {
          // Corner drag — left/right edges
          if (dragState.mode === "tl" || dragState.mode === "bl") {
            const newX = Math.max(0, Math.min(o.x + o.w - MIN_SIZE, o.x + dx));
            nw = o.w + (o.x - newX);
            nx = newX;
          } else {
            nw = Math.max(MIN_SIZE, Math.min(1 - o.x, o.w + dx));
          }
          // Top/bottom edges
          if (dragState.mode === "tl" || dragState.mode === "tr") {
            const newY = Math.max(0, Math.min(o.y + o.h - MIN_SIZE, o.y + dy));
            nh = o.h + (o.y - newY);
            ny = newY;
          } else {
            nh = Math.max(MIN_SIZE, Math.min(1 - o.y, o.h + dy));
          }
        }
        onRectChange({ x: nx, y: ny, w: nw, h: nh });
      };

      const onPointerUp = () => setDragState(null);

      useEffect(() => {
        if (!dragState) return;
        const move = (ev) => onPointerMove(ev);
        const up = () => onPointerUp();
        window.addEventListener("mousemove", move);
        window.addEventListener("mouseup", up);
        window.addEventListener("touchmove", move, { passive: false });
        window.addEventListener("touchend", up);
        return () => {
          window.removeEventListener("mousemove", move);
          window.removeEventListener("mouseup", up);
          window.removeEventListener("touchmove", move);
          window.removeEventListener("touchend", up);
        };
      }, [dragState]);

      const pct = (v) => `${v * 100}%`;
      const handleSize = 22;

      return e("div", {
        ref: containerRef,
        style: {
          position: "relative",
          width: "100%",
          background: "#000",
          borderRadius: 12,
          overflow: "hidden",
          userSelect: "none",
          touchAction: "none",
        },
      },
        e("img", {
          ref: imgRef,
          src,
          alt: "Scale photo",
          style: { display: "block", width: "100%", height: "auto", pointerEvents: "none" },
        }),
        // Dimmed overlay - four strips around the crop rect
        e("div", { style: { position: "absolute", left: 0, top: 0, right: 0, height: pct(rect.y), background: "rgba(0,0,0,0.5)", pointerEvents: "none" } }),
        e("div", { style: { position: "absolute", left: 0, top: pct(rect.y + rect.h), right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", pointerEvents: "none" } }),
        e("div", { style: { position: "absolute", left: 0, top: pct(rect.y), width: pct(rect.x), height: pct(rect.h), background: "rgba(0,0,0,0.5)", pointerEvents: "none" } }),
        e("div", { style: { position: "absolute", left: pct(rect.x + rect.w), top: pct(rect.y), right: 0, height: pct(rect.h), background: "rgba(0,0,0,0.5)", pointerEvents: "none" } }),
        // Crop rectangle (draggable to move)
        e("div", {
          onMouseDown: onPointerDown("move"),
          onTouchStart: onPointerDown("move"),
          style: {
            position: "absolute",
            left: pct(rect.x), top: pct(rect.y),
            width: pct(rect.w), height: pct(rect.h),
            border: "2px solid #f5f1ea",
            boxSizing: "border-box",
            cursor: "move",
          },
        }),
        // Corner handles
        ...["tl", "tr", "bl", "br"].map((corner) => {
          const left = corner.endsWith("l") ? rect.x : rect.x + rect.w;
          const top = corner.startsWith("t") ? rect.y : rect.y + rect.h;
          return e("div", {
            key: corner,
            onMouseDown: onPointerDown(corner),
            onTouchStart: onPointerDown(corner),
            style: {
              position: "absolute",
              left: `calc(${pct(left)} - ${handleSize / 2}px)`,
              top: `calc(${pct(top)} - ${handleSize / 2}px)`,
              width: handleSize, height: handleSize,
              background: "#f5f1ea",
              border: "2px solid #1a1713",
              borderRadius: "50%",
              cursor: corner === "tl" || corner === "br" ? "nwse-resize" : "nesw-resize",
              touchAction: "none",
            },
          });
        }),
      );
    }

          console.warn("SW registration failed:", err);
        }
      });
    }
  </script>
