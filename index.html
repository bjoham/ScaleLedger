<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1713">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <title>Weight Ledger</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap">

  <style>
    html, body { margin: 0; padding: 0; background: #f5f1ea; }
    body { font-family: 'Inter', system-ui, sans-serif; color: #1a1713; }
    #root { min-height: 100vh; }
    /* Initial splash while React loads */
    .boot {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      color: #a39a8d; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;
    }
  </style>

  <!-- Import map lets us use bare module specifiers in the JSX below -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "recharts": "https://esm.sh/recharts@2.12.7?deps=react@18.3.1",
      "lucide-react": "https://esm.sh/lucide-react@0.383.0?deps=react@18.3.1"
    }
  }
  </script>
</head>
<body>
  <div id="root"><div class="boot">Loading…</div></div>

  <script type="module">
    import React, { useState, useEffect, useRef, useMemo } from "react";
    import { createRoot } from "react-dom/client";
    import { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, Customized } from "recharts";
    import { Camera, Plus, Trash2, TrendingDown, TrendingUp, Minus, Settings, X, Loader2, Download, Upload, ChevronDown, ChevronUp, Key } from "lucide-react";

    const e = React.createElement;

    // ---------- Storage (localStorage) ----------
    const store = {
      get(key) {
        try {
          const v = localStorage.getItem(key);
          return v === null ? null : JSON.parse(v);
        } catch { return null; }
      },
      set(key, value) {
        try { localStorage.setItem(key, JSON.stringify(value)); } catch (err) { console.error(err); }
      },
      remove(key) { try { localStorage.removeItem(key); } catch {} },
    };

    const WINDOWS = [
      { key: "1w", label: "1W", months: 0, days: 7 },
      { key: "1m", label: "1M", months: 1 },
      { key: "3m", label: "3M", months: 3 },
      { key: "6m", label: "6M", months: 6 },
      { key: "12m", label: "12M", months: 12 },
    ];
    const HISTORY_PREVIEW = 3;

    function niceInterval(lo, hi) {
      const options = [1, 2, 5, 10, 20, 50];
      const target = 5;
      let best = null;
      for (const step of options) {
        const first = Math.floor(lo / step) * step;
        const last = Math.ceil(hi / step) * step;
        const count = Math.round((last - first) / step) + 1;
        if (count < 3 || count > 7) continue;
        const dist = Math.abs(count - target);
        if (best === null || dist < best.dist || (dist === best.dist && count > best.count)) {
          best = { step, count, dist };
        }
      }
      return best ? best.step : 1;
    }

    function buildTicks(minVal, maxVal) {
      const padded = Math.max((maxVal - minVal) * 0.1, 0.5);
      const lo = minVal - padded;
      const hi = maxVal + padded;
      const step = niceInterval(lo, hi);
      const first = Math.floor(lo / step) * step;
      const last = Math.ceil(hi / step) * step;
      const ticks = [];
      for (let v = first; v <= last + 0.0001; v += step) ticks.push(Math.round(v * 100) / 100);
      return { ticks, domain: [first, last] };
    }

    function regression(points) {
      if (points.length < 2) return null;
      const xs = points.map((p) => p.x);
      const ys = points.map((p) => p.y);
      const n = xs.length;
      const meanX = xs.reduce((a, b) => a + b, 0) / n;
      const meanY = ys.reduce((a, b) => a + b, 0) / n;
      let num = 0, den = 0;
      for (let i = 0; i < n; i++) {
        num += (xs[i] - meanX) * (ys[i] - meanY);
        den += (xs[i] - meanX) ** 2;
      }
      if (den === 0) return null;
      const slope = num / den;
      const intercept = meanY - slope * meanX;
      return { slope, intercept };
    }

    function WeightTracker() {
      const [entries, setEntries] = useState(() => store.get("weight-entries") || []);
      const [height, setHeight] = useState(() => store.get("user-height") ?? 170);
      const [apiKey, setApiKey] = useState(() => store.get("anthropic-api-key") || "");
      const [apiKeyInput, setApiKeyInput] = useState("");

      const [showAdd, setShowAdd] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [showApiKeySheet, setShowApiKeySheet] = useState(false);
      const [manualWeight, setManualWeight] = useState("");
      const [manualDate, setManualDate] = useState(new Date().toISOString().slice(0, 16));
      const [imageProcessing, setImageProcessing] = useState(false);
      const [processingError, setProcessingError] = useState("");
      const [detectedWeight, setDetectedWeight] = useState(null);
      const [previewImage, setPreviewImage] = useState(null);
      const [windowKey, setWindowKey] = useState("1m");
      const [importMessage, setImportMessage] = useState(null);
      const [showAllHistory, setShowAllHistory] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const fileInputRef = useRef(null);
      const importInputRef = useRef(null);

      const saveEntries = (ne) => { setEntries(ne); store.set("weight-entries", ne); };
      const saveHeight = (nh) => { setHeight(nh); store.set("user-height", nh); };
      const saveApiKey = (k) => { setApiKey(k); if (k) store.set("anthropic-api-key", k); else store.remove("anthropic-api-key"); };

      const addEntry = (weight, timestamp) => {
        const entry = { id: Date.now() + Math.random(), weight: parseFloat(weight), timestamp: timestamp || new Date().toISOString() };
        saveEntries([...entries, entry].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp)));
      };

      const deleteEntry = (id) => saveEntries(entries.filter((x) => x.id !== id));

      const deleteOlderThan = (months) => {
        const cutoff = new Date();
        cutoff.setMonth(cutoff.getMonth() - months);
        const kept = entries.filter((x) => new Date(x.timestamp) >= cutoff);
        const removed = entries.length - kept.length;
        if (removed === 0) { alert("No entries older than that."); return; }
        if (confirm(`Delete ${removed} ${removed === 1 ? "entry" : "entries"} older than ${months} months?`)) {
          saveEntries(kept);
        }
      };

      const handleImageUpload = async (ev) => {
        const file = ev.target.files?.[0];
        if (!file) return;
        if (!apiKey) {
          setProcessingError("No API key saved. Add one in Settings first.");
          if (fileInputRef.current) fileInputRef.current.value = "";
          return;
        }
        setProcessingError(""); setDetectedWeight(null); setImageProcessing(true);
        try {
          const base64 = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(",")[1]);
            reader.onerror = () => reject(new Error("Could not read image"));
            reader.readAsDataURL(file);
          });
          setPreviewImage(`data:${file.type};base64,${base64}`);
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-5",
              max_tokens: 200,
              messages: [{
                role: "user",
                content: [
                  { type: "image", source: { type: "base64", media_type: file.type, data: base64 } },
                  { type: "text", text: 'This is a photo of a bathroom scale display. Read the weight value shown. Respond ONLY with a JSON object in this exact format, no other text, no markdown: {"weight_kg": <number>, "confidence": "high"|"medium"|"low"}. If the value appears to be in pounds (lb), convert to kg. If you cannot read a weight, respond: {"weight_kg": null, "confidence": "low"}' },
                ],
              }],
            }),
          });
          if (!response.ok) {
            const errText = await response.text();
            throw new Error(`API error ${response.status}: ${errText.slice(0, 200)}`);
          }
          const data = await response.json();
          const text = (data.content || []).map((i) => i.text || "").join("").trim();
          const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
          if (parsed.weight_kg === null || parsed.weight_kg === undefined) {
            setProcessingError("Couldn't read the weight. Try a clearer photo or enter manually.");
          } else if (parsed.weight_kg < 20 || parsed.weight_kg > 300) {
            setProcessingError(`Got ${parsed.weight_kg} kg — that seems off. Please verify.`);
            setDetectedWeight(parsed.weight_kg);
          } else {
            setDetectedWeight(parsed.weight_kg);
          }
        } catch (err) {
          console.error(err);
          setProcessingError(`Something went wrong: ${err.message || "unknown error"}. Try again or enter manually.`);
        } finally {
          setImageProcessing(false);
          if (fileInputRef.current) fileInputRef.current.value = "";
        }
      };

      const confirmDetected = () => {
        if (detectedWeight != null) { addEntry(detectedWeight, new Date().toISOString()); resetAddSheet(); }
      };

      const submitManual = () => {
        const w = parseFloat(manualWeight);
        if (isNaN(w) || w <= 0) return;
        const ts = new Date(manualDate).toISOString();
        if (editingId != null) {
          const updated = entries
            .map((x) => (x.id === editingId ? { ...x, weight: w, timestamp: ts } : x))
            .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
          saveEntries(updated);
        } else {
          addEntry(w, ts);
        }
        resetAddSheet();
      };

      const openEdit = (entry) => {
        setEditingId(entry.id);
        setManualWeight(String(entry.weight));
        const d = new Date(entry.timestamp);
        const pad = (n) => String(n).padStart(2, "0");
        setManualDate(`${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`);
        setDetectedWeight(null); setPreviewImage(null); setProcessingError("");
        setShowAdd(true);
      };

      const resetAddSheet = () => {
        setShowAdd(false); setManualWeight(""); setManualDate(new Date().toISOString().slice(0, 16));
        setDetectedWeight(null); setPreviewImage(null); setProcessingError(""); setEditingId(null);
      };

      const exportJson = () => {
        const payload = {
          version: 1,
          exportedAt: new Date().toISOString(),
          height_cm: height,
          entries: entries.map((x) => ({ timestamp: x.timestamp, weight_kg: x.weight })),
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = `weight-ledger-${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      const handleImport = async (ev) => {
        const file = ev.target.files?.[0];
        if (!file) return;
        try {
          const parsed = JSON.parse(await file.text());
          if (!parsed.entries || !Array.isArray(parsed.entries)) throw new Error("File missing 'entries' array");
          const imported = parsed.entries
            .filter((x) => x && typeof x.weight_kg === "number" && x.timestamp)
            .map((x, i) => ({
              id: Date.now() + i + Math.random(),
              weight: parseFloat(x.weight_kg),
              timestamp: new Date(x.timestamp).toISOString(),
            }));
          if (imported.length === 0) throw new Error("No valid entries found");
          const existingKeys = new Set(entries.map((x) => `${x.timestamp}|${x.weight}`));
          const newOnes = imported.filter((x) => !existingKeys.has(`${x.timestamp}|${x.weight}`));
          const merged = [...entries, ...newOnes].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
          if (parsed.height_cm && typeof parsed.height_cm === "number") saveHeight(parsed.height_cm);
          saveEntries(merged);
          const dupes = imported.length - newOnes.length;
          setImportMessage({ type: "success", text: `Imported ${newOnes.length} new ${newOnes.length === 1 ? "entry" : "entries"}${dupes > 0 ? ` (${dupes} duplicates skipped)` : ""}.` });
        } catch (err) {
          setImportMessage({ type: "error", text: `Import failed: ${err.message}` });
        } finally {
          if (importInputRef.current) importInputRef.current.value = "";
          setTimeout(() => setImportMessage(null), 4000);
        }
      };

      const latest = entries.length > 0 ? entries[entries.length - 1] : null;
      const previous = entries.length > 1 ? entries[entries.length - 2] : null;
      const changeFromPrev = latest && previous ? latest.weight - previous.weight : 0;
      const bmi = latest ? latest.weight / Math.pow(height / 100, 2) : 0;
      const activeWindow = WINDOWS.find((w) => w.key === windowKey);

      const { windowStartTs, windowEndTs, windowEntries, chartData, yDomain, yTicks, xTicks, hasTrend, trendStart, trendEnd } = useMemo(() => {
        const now = Date.now();
        const start = new Date();
        if (activeWindow.days) start.setDate(start.getDate() - activeWindow.days);
        else start.setMonth(start.getMonth() - activeWindow.months);
        const startTs = start.getTime();
        const endTs = now;

        const filtered = entries.filter((x) => {
          const t = new Date(x.timestamp).getTime();
          return t >= startTs && t <= endTs;
        });

        const cd = filtered.map((x) => ({ ts: new Date(x.timestamp).getTime(), weight: x.weight }));

        let yMin, yMax;
        if (cd.length > 0) {
          yMin = Math.min(...cd.map((d) => d.weight));
          yMax = Math.max(...cd.map((d) => d.weight));
          if (yMin === yMax) { yMin -= 1; yMax += 1; }
        } else {
          const ref = latest ? latest.weight : 70;
          yMin = ref - 2; yMax = ref + 2;
        }
        const { ticks: yt, domain: yd } = buildTicks(yMin, yMax);

        const xt = [
          startTs,
          startTs + (endTs - startTs) / 3,
          startTs + ((endTs - startTs) * 2) / 3,
          endTs,
        ];

        const reg = regression(cd.map((d) => ({ x: d.ts, y: d.weight })));
        let tStart = null, tEnd = null;
        if (reg) {
          tStart = reg.intercept + reg.slope * startTs;
          tEnd = reg.intercept + reg.slope * endTs;
        }

        let unified = cd.map((d) => ({ ts: d.ts, weight: d.weight, trend: reg ? reg.intercept + reg.slope * d.ts : null }));
        if (reg) {
          const hasStart = unified.some((d) => d.ts === startTs);
          const hasEnd = unified.some((d) => d.ts === endTs);
          if (!hasStart) unified.unshift({ ts: startTs, weight: null, trend: tStart });
          if (!hasEnd) unified.push({ ts: endTs, weight: null, trend: tEnd });
          unified.sort((a, b) => a.ts - b.ts);
        }

        return {
          windowStartTs: startTs, windowEndTs: endTs,
          windowEntries: filtered, chartData: unified,
          yDomain: yd, yTicks: yt, xTicks: xt,
          hasTrend: reg !== null, trendStart: tStart, trendEnd: tEnd,
        };
      }, [entries, activeWindow.months, activeWindow.days, latest]);

      const monthlyTrend = useMemo(() => {
        if (entries.length < 2) return null;
        const cutoff = new Date();
        cutoff.setMonth(cutoff.getMonth() - 1);
        const recent = entries.filter((x) => new Date(x.timestamp) >= cutoff);
        if (recent.length < 2) return null;
        const reg = regression(recent.map((x) => ({ x: new Date(x.timestamp).getTime(), y: x.weight })));
        if (!reg) return null;
        return reg.slope * (1000 * 60 * 60 * 24 * 30);
      }, [entries]);

      const bmiCategory = (b) => {
        if (b < 18.5) return { label: "Underweight", color: "var(--accent-blue)" };
        if (b < 25) return { label: "Normal", color: "var(--accent-green)" };
        if (b < 30) return { label: "Overweight", color: "var(--accent-amber)" };
        return { label: "Obese", color: "var(--accent-red)" };
      };

      const min = windowEntries.length > 0 ? Math.min(...windowEntries.map((x) => x.weight)) : 0;
      const max = windowEntries.length > 0 ? Math.max(...windowEntries.map((x) => x.weight)) : 0;
      const avg = windowEntries.length > 0 ? windowEntries.reduce((s, x) => s + x.weight, 0) / windowEntries.length : 0;

      const formatXTick = (ts) => new Date(ts).toLocaleDateString(undefined, { month: "short", day: "numeric" });

      const formatDate = (iso) => {
        const d = new Date(iso);
        const today = new Date();
        const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
        if (d.toDateString() === today.toDateString()) return "Today, " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        if (d.toDateString() === yesterday.toDateString()) return "Yesterday, " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        return d.toLocaleDateString(undefined, { month: "short", day: "numeric" }) + ", " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      };

      const TrendLabels = ({ xAxisMap, yAxisMap }) => {
        if (trendStart == null || trendEnd == null) return null;
        const xAxis = xAxisMap && Object.values(xAxisMap)[0];
        const yAxis = yAxisMap && Object.values(yAxisMap)[0];
        if (!xAxis || !yAxis) return null;
        const leftX = xAxis.scale(windowStartTs);
        const rightX = xAxis.scale(windowEndTs);
        const leftY = yAxis.scale(trendStart);
        const rightY = yAxis.scale(trendEnd);
        return e("g", null,
          e("text", { x: leftX + 6, y: leftY - 6, fontSize: 10, fontFamily: "var(--font-sans)", fill: "var(--ink-soft)", fontWeight: 600 }, trendStart.toFixed(1)),
          e("text", { x: rightX - 6, y: rightY - 6, fontSize: 10, fontFamily: "var(--font-sans)", fill: "var(--ink-soft)", fontWeight: 600, textAnchor: "end" }, trendEnd.toFixed(1))
        );
      };

      // First-launch: if no API key, show the API key sheet once.
      useEffect(() => {
        if (!apiKey && entries.length === 0) {
          // Don't pop it aggressively — let the user explore first.
          // But expose a banner hint.
        }
      }, []);

      const visibleHistory = showAllHistory ? [...entries].reverse() : [...entries].reverse().slice(0, HISTORY_PREVIEW);
      const hiddenCount = Math.max(0, entries.length - HISTORY_PREVIEW);

      return e(React.Fragment, null,
        e("style", null, globalStyles),
        e("div", { style: styles.app },
          // Header
          e("header", { style: styles.header },
            e("div", null,
              e("div", { style: styles.eyebrow }, "Your weight"),
              e("h1", { style: styles.title }, "Ledger")
            ),
            e("button", { style: styles.iconBtn, onClick: () => setShowSettings(true), "aria-label": "Settings" },
              e(Settings, { size: 18 })
            )
          ),

          // No API key banner
          !apiKey && e("div", { style: styles.apiBanner, onClick: () => setShowApiKeySheet(true) },
            e(Key, { size: 14 }),
            e("span", null, "Add API key to enable scale-photo reading")
          ),

          // Hero
          e("section", { style: styles.heroCard },
            latest ? e(React.Fragment, null,
              e("div", { style: styles.heroLabel }, "Latest reading · ", formatDate(latest.timestamp)),
              e("div", { style: styles.heroValue },
                e("span", { style: styles.heroNumber }, latest.weight.toFixed(1)),
                e("span", { style: styles.heroUnit }, "kg")
              ),
              e("div", { style: styles.trendGroup },
                previous && e("div", { style: { ...styles.trend, color: changeFromPrev < 0 ? "var(--accent-green)" : changeFromPrev > 0 ? "var(--accent-amber)" : "var(--ink-soft)" } },
                  changeFromPrev < 0 ? e(TrendingDown, { size: 14 }) : changeFromPrev > 0 ? e(TrendingUp, { size: 14 }) : e(Minus, { size: 14 }),
                  e("span", null, `${changeFromPrev > 0 ? "+" : ""}${changeFromPrev.toFixed(1)} kg from previous`)
                ),
                monthlyTrend !== null && e("div", { style: { ...styles.trend, color: monthlyTrend < -0.05 ? "var(--accent-green)" : monthlyTrend > 0.05 ? "var(--accent-amber)" : "var(--ink-soft)" } },
                  monthlyTrend < -0.05 ? e(TrendingDown, { size: 14 }) : monthlyTrend > 0.05 ? e(TrendingUp, { size: 14 }) : e(Minus, { size: 14 }),
                  e("span", null, `${monthlyTrend > 0 ? "+" : ""}${monthlyTrend.toFixed(1)} kg/month trend`)
                )
              )
            ) : e(React.Fragment, null,
              e("div", { style: styles.heroLabel }, "No readings yet"),
              e("div", { style: styles.heroValue }, e("span", { style: styles.heroNumberMuted }, "—")),
              e("div", { style: styles.trend }, "Tap the + below to log your first weight")
            )
          ),

          // Chart
          entries.length > 0 && e("section", { style: styles.chartCard },
            e("div", { style: styles.sectionHeader },
              e("span", { style: styles.sectionLabel }, "Trend"),
              e("div", { style: styles.windowToggle },
                WINDOWS.map((w) => e("button", {
                  key: w.key,
                  style: { ...styles.windowBtn, ...(windowKey === w.key ? styles.windowBtnActive : {}) },
                  onClick: () => setWindowKey(w.key),
                }, w.label))
              )
            ),
            e("div", { style: { height: 200, marginTop: 8, marginLeft: -8 } },
              e(ResponsiveContainer, { width: "100%", height: "100%" },
                e(LineChart, { data: chartData, margin: { top: 14, right: 16, left: 0, bottom: 0 } },
                  e(XAxis, {
                    type: "number", dataKey: "ts",
                    domain: [windowStartTs, windowEndTs],
                    ticks: xTicks, tickFormatter: formatXTick,
                    tick: { fontSize: 10, fill: "var(--ink-soft)" },
                    axisLine: false, tickLine: false, allowDataOverflow: false,
                  }),
                  e(YAxis, {
                    type: "number", domain: yDomain, ticks: yTicks,
                    tick: { fontSize: 10, fill: "var(--ink-soft)" },
                    axisLine: false, tickLine: false, width: 32,
                  }),
                  e(Tooltip, {
                    contentStyle: { background: "var(--paper)", border: "1px solid var(--line)", borderRadius: 8, fontSize: 12, fontFamily: "var(--font-sans)" },
                    labelFormatter: (ts) => new Date(ts).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }),
                    formatter: (v, name) => [`${v.toFixed(1)} kg`, name === "weight" ? "Weight" : "Trend"],
                    filterNull: true,
                  }),
                  hasTrend && e(Line, {
                    type: "linear", dataKey: "trend",
                    stroke: "var(--ink-faint)", strokeWidth: 1.5, strokeDasharray: "3 4",
                    dot: false, activeDot: false, isAnimationActive: false,
                    legendType: "none", tooltipType: "none", connectNulls: true,
                  }),
                  e(Line, {
                    type: "monotone", dataKey: "weight",
                    stroke: "var(--ink)", strokeWidth: 2,
                    dot: { r: 3, fill: "var(--paper)", stroke: "var(--ink)", strokeWidth: 2 },
                    activeDot: { r: 5, fill: "var(--accent-green)" },
                    isAnimationActive: false, connectNulls: true,
                  }),
                  e(Customized, { component: TrendLabels })
                )
              )
            ),
            windowEntries.length > 0
              ? e("div", { style: styles.statsRow },
                  e(Stat, { label: "Low", value: min.toFixed(1) }),
                  e(Stat, { label: "Avg", value: avg.toFixed(1) }),
                  e(Stat, { label: "High", value: max.toFixed(1) })
                )
              : e("div", { style: styles.emptyWindowNote },
                  `No readings in this window. Last recorded: ${latest.weight.toFixed(1)} kg on ${formatDate(latest.timestamp)}.`
                )
          ),

          // BMI
          latest && e("section", { style: styles.bmiCard },
            e("div", { style: styles.sectionHeader },
              e("span", { style: styles.sectionLabel }, "BMI"),
              e("span", { style: styles.sectionHint }, `Based on ${height} cm`)
            ),
            e("div", { style: styles.bmiRow },
              e("div", null,
                e("div", { style: styles.bmiValue }, bmi.toFixed(1)),
                e("div", { style: { ...styles.bmiCategory, color: bmiCategory(bmi).color } }, bmiCategory(bmi).label)
              ),
              e(BMIGauge, { bmi })
            )
          ),

          // History
          entries.length > 0 && e("section", { style: styles.historyCard },
            e("div", { style: styles.sectionHeader },
              e("span", { style: styles.sectionLabel }, "History"),
              e("span", { style: styles.sectionHint }, `${entries.length} total`)
            ),
            e("div", { style: styles.historyList },
              visibleHistory.map((x) => e("div", {
                key: x.id, style: styles.historyItem, onClick: () => openEdit(x), role: "button", tabIndex: 0,
              },
                e("div", null,
                  e("div", { style: styles.historyWeight },

                  style: styles.deleteBtn,
                  onClick: (ev) => { ev.stopPropagation(); deleteEntry(x.id); },

            ),
            hiddenCount > 0 && e("button", {
              style: styles.showMoreBtn,
              onClick: () => setShowAllHistory(!showAllHistory),

              showAllHistory

          ),

          e("div", { style: { height: 90 } }),

          // FAB

            e(Plus, { size: 22, strokeWidth: 2.5 })
          ),

          // Add/Edit sheet
          showAdd && e("div", { style: styles.sheetBackdrop, onClick: resetAddSheet },
            e("div", { style: styles.sheet, onClick: (ev) => ev.stopPropagation() },

              e("div", { style: styles.sheetHeader },
                e("h2", { style: styles.sheetTitle }, editingId != null ? "Edit reading" : "Log weight"),
                e("button", { style: styles.closeBtn, onClick: resetAddSheet }, e(X, { size: 18 }))

              editingId == null && e(React.Fragment, null,
                e("button", {
                  style: styles.scanBtn,
                  onClick: () => fileInputRef.current?.click(),
                  disabled: imageProcessing || !apiKey,
                },
                  imageProcessing
                    ? e(React.Fragment, null, e(Loader2, { size: 18, style: { animation: "spin 1s linear infinite" } }), e("span", null, "Reading your scale…"))

                e("input", {
                  ref: fileInputRef, type: "file", accept: "image/*", capture: "environment",
                  onChange: handleImageUpload, style: { display: "none" },
                }),
                previewImage && e("div", { style: styles.previewBox },
                  e("img", { src: previewImage, alt: "Scale", style: styles.previewImg })
                ),
                detectedWeight != null && !imageProcessing && e("div", { style: styles.detectedBox },
                  e("div", { style: styles.detectedLabel }, "Detected reading"),
                  e("div", { style: styles.detectedValue }, detectedWeight.toFixed(1), " kg"),
                  e("button", { style: styles.primaryBtn, onClick: confirmDetected }, "Save this reading")
                ),
                processingError && e("div", { style: styles.errorBox }, processingError),
                e("div", { style: styles.divider }, e("span", { style: styles.dividerText }, "or enter manually"))
              ),
              e("label", { style: styles.fieldLabel }, "Weight (kg)"),
              e("input", {
                type: "number", step: "0.1", placeholder: "e.g. 72.4",
                value: manualWeight, onChange: (ev) => setManualWeight(ev.target.value),
                style: styles.input, inputMode: "decimal",
              }),
              e("label", { style: styles.fieldLabel }, "Date & time"),
              e("input", {
                type: "datetime-local", value: manualDate,
                onChange: (ev) => setManualDate(ev.target.value), style: styles.input,
              }),
              e("button", {
                style: { ...styles.primaryBtn, marginTop: 16, opacity: manualWeight ? 1 : 0.4 },
                onClick: submitManual, disabled: !manualWeight,
              }, editingId != null ? "Save changes" : "Save entry")
            )
          ),

          // Settings sheet
          showSettings && e("div", { style: styles.sheetBackdrop, onClick: () => setShowSettings(false) },
            e("div", { style: styles.sheet, onClick: (ev) => ev.stopPropagation() },
              e("div", { style: styles.sheetHandle }),
              e("div", { style: styles.sheetHeader },
                e("h2", { style: styles.sheetTitle }, "Settings"),
                e("button", { style: styles.closeBtn, onClick: () => setShowSettings(false) }, e(X, { size: 18 }))
              ),
              e("label", { style: styles.fieldLabel }, "Your height (cm)"),
              e("input", {
                type: "number", value: height,
                onChange: (ev) => saveHeight(parseFloat(ev.target.value) || 170),
                style: styles.input, inputMode: "decimal",
              }),
              e("div", { style: styles.hint }, "Used to calculate your BMI."),

              e("div", { style: { height: 20 } }),
              e("div", { style: styles.settingsGroupLabel }, "API Key"),
              e("div", { style: styles.hint },
                apiKey ? `Saved (ends in …${apiKey.slice(-4)}). Used for scale-photo reading.` : "Not set. Scale-photo reading is disabled."
              ),
              e("div", { style: styles.btnRow },
                e("button", {
                  style: styles.secondaryBtn,
                  onClick: () => { setApiKeyInput(apiKey); setShowApiKeySheet(true); setShowSettings(false); },
                }, e(Key, { size: 14 }), e("span", null, apiKey ? "Update key" : "Add key"))
              ),

              e("div", { style: { height: 20 } }),
              e("div", { style: styles.settingsGroupLabel }, "Data"),
              e("div", { style: styles.hint },
                `${entries.length} ${entries.length === 1 ? "reading" : "readings"} stored on this device.`
              ),
              e("div", { style: styles.btnRow },
                e("button", { style: styles.secondaryBtn, onClick: exportJson, disabled: entries.length === 0 },
                  e(Download, { size: 14 }), e("span", null, "Export JSON")
                ),
                e("button", { style: styles.secondaryBtn, onClick: () => importInputRef.current?.click() },
                  e(Upload, { size: 14 }), e("span", null, "Import JSON")
                ),
                e("input", {
                  ref: importInputRef, type: "file", accept: "application/json,.json",
                  onChange: handleImport, style: { display: "none" },
                })
              ),
              importMessage && e("div", {
                style: {
                  ...styles.inlineMessage,
                  color: importMessage.type === "success" ? "var(--accent-green)" : "var(--accent-red)",
                  background: importMessage.type === "success" ? "rgba(74, 124, 58, 0.08)" : "rgba(181, 74, 58, 0.08)",
                  borderColor: importMessage.type === "success" ? "rgba(74, 124, 58, 0.25)" : "rgba(181, 74, 58, 0.25)",

              }, importMessage.text),

              e("div", { style: { height: 20 } }),
              e("div", { style: styles.settingsGroupLabel }, "Delete older than"),
              e("div", { style: styles.btnRow },
                e("button", { style: styles.secondaryBtn, onClick: () => deleteOlderThan(6), disabled: entries.length === 0 }, "6 months"),
                e("button", { style: styles.secondaryBtn, onClick: () => deleteOlderThan(12), disabled: entries.length === 0 }, "1 year"),
                e("button", { style: styles.secondaryBtn, onClick: () => deleteOlderThan(24), disabled: entries.length === 0 }, "2 years")
              ),

              entries.length > 0 && e("button", {
                style: styles.dangerBtn,
                onClick: () => {
                  if (confirm("Delete all weight entries? This cannot be undone.")) {
                    saveEntries([]); setShowSettings(false);
                  }
                },
              }, "Clear all data")
            )
          ),

          // API Key sheet
          showApiKeySheet && e("div", { style: styles.sheetBackdrop, onClick: () => setShowApiKeySheet(false) },
            e("div", { style: styles.sheet, onClick: (ev) => ev.stopPropagation() },
              e("div", { style: styles.sheetHandle }),
              e("div", { style: styles.sheetHeader },
                e("h2", { style: styles.sheetTitle }, apiKey ? "Update API key" : "Add API key"),
                e("button", { style: styles.closeBtn, onClick: () => setShowApiKeySheet(false) }, e(X, { size: 18 }))
              ),
              e("div", { style: styles.hint },
                "Your Anthropic API key stays on this device (localStorage). It's used only to read weight from scale photos. Get one at console.anthropic.com."
              ),
              e("label", { style: styles.fieldLabel }, "API key"),
              e("input", {
                type: "password", placeholder: "sk-ant-…",
                value: apiKeyInput, onChange: (ev) => setApiKeyInput(ev.target.value),
                style: styles.input, autoComplete: "off",
              }),
              e("button", {
                style: { ...styles.primaryBtn, marginTop: 16 },
                onClick: () => {
                  saveApiKey(apiKeyInput.trim());
                  setApiKeyInput("");
                  setShowApiKeySheet(false);
                },
                disabled: !apiKeyInput.trim(),
              }, "Save"),
              apiKey && e("button", {
                style: { ...styles.dangerBtn, marginTop: 12 },
                onClick: () => {
                  if (confirm("Remove saved API key? Scale-photo reading will be disabled.")) {
                    saveApiKey(""); setShowApiKeySheet(false);
                  }
                },
              }, "Remove key")
            )
          )
        )
      );
    }

    function Stat({ label, value }) {
      return e("div", { style: styles.stat },
        e("div", { style: styles.statLabel }, label),
        e("div", { style: styles.statValue }, value)
      );
    }

    function BMIGauge({ bmi }) {
      const clamped = Math.max(15, Math.min(35, bmi));
      const pct = ((clamped - 15) / 20) * 100;
      return e("div", { style: { width: 120 } },
        e("div", { style: { position: "relative", height: 8, borderRadius: 4, overflow: "hidden", display: "flex" } },
          e("div", { style: { flex: 1, background: "var(--accent-blue)", opacity: 0.6 } }),
          e("div", { style: { flex: 2, background: "var(--accent-green)", opacity: 0.6 } }),
          e("div", { style: { flex: 1, background: "var(--accent-amber)", opacity: 0.6 } }),
          e("div", { style: { flex: 1, background: "var(--accent-red)", opacity: 0.6 } }),
          e("div", { style: { position: "absolute", left: `${pct}%`, top: -3, bottom: -3, width: 3, background: "var(--ink)", borderRadius: 2, transform: "translateX(-50%)" } })
        ),
        e("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 9, color: "var(--ink-faint)", marginTop: 4, fontFamily: "var(--font-sans)" } },
          e("span", null, "15"), e("span", null, "25"), e("span", null, "35")
        )
      );
    }

    const globalStyles = `
      :root {
        --paper: #f5f1ea; --paper-soft: #ebe5da; --ink: #1a1713;
        --ink-soft: #6b6358; --ink-faint: #a39a8d; --line: #d9d1c4;
        --accent-green: #4a7c3a; --accent-blue: #3a6a7c;
        --accent-amber: #c08a3e; --accent-red: #b54a3a;
        --font-display: 'Fraunces', Georgia, serif;
        --font-sans: 'Inter', system-ui, sans-serif;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      input { font-family: var(--font-sans); }
      input:focus { outline: 2px solid var(--ink); outline-offset: -1px; }
      button { font-family: var(--font-sans); cursor: pointer; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
    `;

    const styles = {
      app: { maxWidth: 480, margin: "0 auto", padding: "20px 16px 16px", minHeight: "100vh", background: "var(--paper)", color: "var(--ink)", fontFamily: "var(--font-sans)", position: "relative" },
      header: { display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 20 },
      eyebrow: { fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase", color: "var(--ink-soft)", marginBottom: 2 },
      title: { fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 32, letterSpacing: "-0.02em", margin: 0, fontStyle: "italic" },
      iconBtn: { background: "transparent", border: "1px solid var(--line)", borderRadius: 10, padding: 10, color: "var(--ink)", display: "flex", alignItems: "center", justifyContent: "center" },
      apiBanner: { display: "flex", alignItems: "center", gap: 8, padding: "10px 14px", background: "var(--paper-soft)", border: "1px solid var(--line)", borderRadius: 10, marginBottom: 14, fontSize: 12, color: "var(--ink-soft)", cursor: "pointer" },
      heroCard: { background: "var(--paper-soft)", borderRadius: 16, padding: "22px 20px", marginBottom: 14, border: "1px solid var(--line)" },
      heroLabel: { fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--ink-soft)", marginBottom: 10 },
      heroValue: { display: "flex", alignItems: "baseline", gap: 8, marginBottom: 10 },
      heroNumber: { fontFamily: "var(--font-display)", fontSize: 56, fontWeight: 500, letterSpacing: "-0.03em", lineHeight: 1 },
      heroNumberMuted: { fontFamily: "var(--font-display)", fontSize: 56, color: "var(--ink-faint)", lineHeight: 1 },
      heroUnit: { fontSize: 16, color: "var(--ink-soft)", fontFamily: "var(--font-display)", fontStyle: "italic" },
      trendGroup: { display: "flex", flexDirection: "column", gap: 4 },
      trend: { display: "flex", alignItems: "center", gap: 6, fontSize: 13, fontWeight: 500 },
      chartCard: { background: "var(--paper-soft)", borderRadius: 16, padding: "18px 16px", marginBottom: 14, border: "1px solid var(--line)" },
      sectionHeader: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0 4px" },
      sectionLabel: { fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase", color: "var(--ink-soft)", fontWeight: 600 },
      sectionHint: { fontSize: 11, color: "var(--ink-faint)" },
      windowToggle: { display: "flex", gap: 4, background: "var(--paper)", border: "1px solid var(--line)", borderRadius: 8, padding: 2 },
      windowBtn: { background: "transparent", border: "none", padding: "5px 8px", borderRadius: 6, fontSize: 11, fontWeight: 600, color: "var(--ink-soft)", letterSpacing: "0.05em" },
      windowBtnActive: { background: "var(--ink)", color: "var(--paper)" },
      statsRow: { display: "flex", justifyContent: "space-around", marginTop: 12, paddingTop: 14, borderTop: "1px solid var(--line)" },
      stat: { textAlign: "center" },
      statLabel: { fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--ink-soft)", marginBottom: 2 },
      statValue: { fontFamily: "var(--font-display)", fontSize: 20, fontWeight: 500 },
      emptyWindowNote: { fontSize: 12, color: "var(--ink-soft)", textAlign: "center", marginTop: 12, paddingTop: 14, borderTop: "1px solid var(--line)" },
      bmiCard: { background: "var(--paper-soft)", borderRadius: 16, padding: "18px 20px", marginBottom: 14, border: "1px solid var(--line)" },
      bmiRow: { display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10 },
      bmiValue: { fontFamily: "var(--font-display)", fontSize: 36, fontWeight: 500, lineHeight: 1 },
      bmiCategory: { fontSize: 13, fontWeight: 600, marginTop: 4 },
      historyCard: { background: "var(--paper-soft)", borderRadius: 16, padding: "18px 20px", border: "1px solid var(--line)" },
      historyList: { marginTop: 10 },
      historyItem: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: "1px solid var(--line)", cursor: "pointer" },
      historyEditHint: { color: "var(--ink-faint)", fontSize: 11, fontStyle: "italic" },
      historyWeight: { fontFamily: "var(--font-display)", fontSize: 19, fontWeight: 500 },
      historyUnit: { fontSize: 12, color: "var(--ink-soft)", fontStyle: "italic" },
      historyDate: { fontSize: 12, color: "var(--ink-soft)", marginTop: 2 },
      deleteBtn: { background: "transparent", border: "none", color: "var(--ink-faint)", padding: 8, borderRadius: 6 },
      showMoreBtn: { marginTop: 10, width: "100%", padding: "10px", background: "transparent", border: "1px solid var(--line)", borderRadius: 8, color: "var(--ink-soft)", fontSize: 12, fontWeight: 500, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 },
      fab: { position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", width: 58, height: 58, borderRadius: "50%", background: "var(--ink)", color: "var(--paper)", border: "none", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 8px 24px rgba(26, 23, 19, 0.25)", zIndex: 10 },
      sheetBackdrop: { position: "fixed", inset: 0, background: "rgba(26, 23, 19, 0.4)", zIndex: 100, display: "flex", alignItems: "flex-end", justifyContent: "center", animation: "fadeIn 0.2s ease" },
      sheet: { background: "var(--paper)", borderTopLeftRadius: 20, borderTopRightRadius: 20, padding: "10px 20px 28px", width: "100%", maxWidth: 480, maxHeight: "92vh", overflowY: "auto", animation: "slideUp 0.28s cubic-bezier(0.2, 0.8, 0.2, 1)" },
      sheetHandle: { width: 36, height: 4, background: "var(--line)", borderRadius: 2, margin: "4px auto 14px" },
      sheetHeader: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 },
      sheetTitle: { fontFamily: "var(--font-display)", fontSize: 24, fontWeight: 500, margin: 0, fontStyle: "italic" },
      closeBtn: { background: "transparent", border: "none", color: "var(--ink-soft)", padding: 6, display: "flex" },
      scanBtn: { width: "100%", padding: "16px", background: "var(--ink)", color: "var(--paper)", border: "none", borderRadius: 12, fontSize: 15, fontWeight: 500, display: "flex", alignItems: "center", justifyContent: "center", gap: 10 },
      previewBox: { marginTop: 14, borderRadius: 12, overflow: "hidden", border: "1px solid var(--line)", maxHeight: 180 },
      previewImg: { width: "100%", height: "100%", objectFit: "cover", display: "block" },
      detectedBox: { marginTop: 14, padding: 16, background: "var(--paper-soft)", borderRadius: 12, border: "1px solid var(--line)" },
      detectedLabel: { fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--ink-soft)", marginBottom: 4 },
      detectedValue: { fontFamily: "var(--font-display)", fontSize: 32, fontWeight: 500, marginBottom: 12 },
      errorBox: { marginTop: 14, padding: "12px 14px", background: "rgba(181, 74, 58, 0.08)", border: "1px solid rgba(181, 74, 58, 0.2)", borderRadius: 10, fontSize: 13, color: "var(--accent-red)" },
      divider: { display: "flex", alignItems: "center", margin: "22px 0 14px", color: "var(--ink-faint)" },
      dividerText: { width: "100%", textAlign: "center", fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", position: "relative" },
      fieldLabel: { display: "block", fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--ink-soft)", fontWeight: 600, marginBottom: 6, marginTop: 12 },
      settingsGroupLabel: { fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase", color: "var(--ink-soft)", fontWeight: 600, marginBottom: 6 },
      input: { width: "100%", padding: "12px 14px", border: "1px solid var(--line)", borderRadius: 10, fontSize: 16, background: "var(--paper)", color: "var(--ink)" },
      primaryBtn: { width: "100%", padding: "14px", background: "var(--ink)", color: "var(--paper)", border: "none", borderRadius: 10, fontSize: 15, fontWeight: 500 },
      secondaryBtn: { flex: 1, padding: "10px 8px", background: "var(--paper-soft)", color: "var(--ink)", border: "1px solid var(--line)", borderRadius: 10, fontSize: 12, fontWeight: 500, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 },
      btnRow: { display: "flex", gap: 8, marginTop: 8 },
      dangerBtn: { width: "100%", padding: "12px", background: "transparent", color: "var(--accent-red)", border: "1px solid rgba(181, 74, 58, 0.3)", borderRadius: 10, fontSize: 14, fontWeight: 500, marginTop: 16 },
      hint: { fontSize: 12, color: "var(--ink-soft)", marginTop: 4, marginBottom: 8 },
      inlineMessage: { marginTop: 10, padding: "10px 12px", borderRadius: 8, fontSize: 12, border: "1px solid" },
    };

    // Mount
    const root = createRoot(document.getElementById("root"));
    root.render(e(WeightTracker));

    // Register service worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch((err) => {
          console.warn("SW registration failed:", err);
        });
      });
    }
  </script>
